client_configs:
  train_configs:
    # Local trainer (DIMAT-aware: resets BN stats after loading global params)
    trainer: "DIMATTrainer"
    mode: "step"
    num_local_steps: 100
    optim: "Adam"
    optim_args:
      lr: 0.001
    # Loss function
    loss_fn_path: "./resources/loss/celoss.py"
    loss_fn_name: "CELoss"
    # Client validation
    do_validation: True
    do_pre_validation: True
    metric_path: "./resources/metric/acc.py"
    metric_name: "accuracy"
    # Differential privacy
    use_dp: False
    epsilon: 1
    clip_grad: False
    clip_value: 1
    clip_norm: 1
    # Data loader
    train_batch_size: 64
    val_batch_size: 64
    train_data_shuffle: True
    val_data_shuffle: False

  model_configs:
    # Use DIMAT-compatible ResNet (has nn.AdaptiveAvgPool2d as named module)
    model_path: "./resources/model/resnet_dimat.py"
    model_name: "ResNet18"

  comm_configs:
    compressor_configs:
      enable_compression: False
      lossy_compressor: "SZ2Compressor"
      lossless_compressor: "blosc"
      error_bounding_mode: "REL"
      error_bound: 1e-3
      param_cutoff: 1024

server_configs:
  num_clients: 2
  scheduler: "SyncScheduler"
  scheduler_kwargs:
    same_init_model: True
  aggregator: "DIMATaggregator"
  aggregator_kwargs:
    # Graph function matching model architecture
    graph_func: "resnet18_appfl"
    # Matching function: permutation-based alignment (Rebasin-like)
    match_func: "match_tensors_permute"
    # Proxy dataset for computing activation statistics
    proxy_dataset_path: "./resources/dataset/cifar10_proxy.py"
    proxy_dataset_name: "get_cifar10_proxy"
    proxy_dataset_kwargs:
      num_samples: 500
    proxy_batch_size: 64
    # Device for merge computation
    device: "cpu"
  num_global_epochs: 10
  logging_output_dirname: "./output"
  logging_output_filename: "result"
  comm_configs:
    grpc_configs:
      server_uri: localhost:50051
      max_message_size: 1048576
      use_ssl: False
