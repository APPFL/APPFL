client_configs:
  train_configs:
    trainer: "DIMATTrainer"
    mode: "epoch"
    num_local_epochs: 2
    optim: "Adam"
    optim_args:
      lr: 0.001
    loss_fn_path: "./resources/loss/celoss.py"
    loss_fn_name: "CELoss"
    do_validation: True
    do_pre_validation: True
    metric_path: "./resources/metric/acc.py"
    metric_name: "accuracy"
    use_dp: False
    epsilon: 1
    clip_grad: False
    clip_value: 1
    clip_norm: 1
    train_batch_size: 64
    val_batch_size: 64
    train_data_shuffle: True
    val_data_shuffle: False

  model_configs:
    model_path: "./resources/model/resnet_dimat.py"
    model_name: "ResNet18"
    model_kwargs:
      num_classes: 7

  comm_configs:
    compressor_configs:
      enable_compression: False
      lossy_compressor: "SZ2Compressor"
      lossless_compressor: "blosc"
      error_bounding_mode: "REL"
      error_bound: 1e-3
      param_cutoff: 1024

server_configs:
  num_clients: 4
  scheduler: "SyncScheduler"
  scheduler_kwargs:
    same_init_model: True
  aggregator: "DIMATaggregator"
  aggregator_kwargs:
    graph_func: "resnet18_appfl"
    match_func: "match_tensors_permute"
    proxy_dataset_path: "./resources/dataset/coronahack_proxy.py"
    proxy_dataset_name: "get_coronahack_proxy"
    proxy_dataset_kwargs:
      num_samples: 500
      num_pixel: 32
    proxy_batch_size: 64
    device: "cuda"
  num_global_epochs: 50
  logging_output_dirname: "./output"
  logging_output_filename: "result"
  comm_configs:
    grpc_configs:
      server_uri: localhost:50051
      max_message_size: 1048576
      use_ssl: False
