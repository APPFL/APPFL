clients:
  - client_id: "TES-GWAS-Client1"
    train_configs:
      trainer_output_dirname: ./GA4GH_Demo/sites/Site1/output
      logging_output_dirname: ./GA4GH_Demo/sites/Site1/output/logs
      logging_output_filename: appfl_site1

    data_configs:
      dataset_path: ./resources/configs/gwas/site_data.py
      dataset_name: get_site_gwas_dataset
      dataset_kwargs:
        data_dir: /app/resources/configs/gwas/sites-data/Site1/data
        site_id: Site1

    comm_configs:
      tes_configs:
        tes_endpoint: "http://54.251.133.79:8000"
        auth_token: ""
        docker_image: "zilinghan/client-gwas:latest"
        resource_requirements:
          cpu_cores: 4
          ram_gb: 8.0
          disk_gb: 20.0
          preemptible: false

